<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kids Multiplication Game</title>

<style>

body{
font-family:'Comic Sans MS', Arial;
text-align:center;
background:linear-gradient(120deg,#a1ffce,#faffd1);
padding-top:20px;
}

.card{
background:white;
width:95%;
max-width:350px;
margin:auto;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
position:relative;
overflow:hidden;
}

.character{font-size:60px;}
.question{font-size:38px;font-weight:bold;margin:10px;}
.timer{font-size:18px;color:#d63031;}

.choices{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
}

button.choice{
font-size:20px;
padding:12px;
border:none;
border-radius:12px;
background:#74b9ff;
color:white;
cursor:pointer;
}

button.choice:disabled{
opacity:0.7;
cursor:not-allowed;
}

button.correct{
background:#00b894 !important;
}

button.wrong{
background:#d63031 !important;
}

.result{font-size:20px;margin-top:10px;font-weight:bold;}
.score{margin-top:10px;font-size:16px;}
.medal{font-size:35px;margin-top:10px;}
.footer{margin-top:10px;font-size:13px;color:#555;}

.star{
position:absolute;
font-size:22px;
animation:fall 1s linear forwards;
}

@keyframes fall{
0%{transform:translateY(-50px) rotate(0deg);opacity:1;}
100%{transform:translateY(200px) rotate(360deg);opacity:0;}
}

.restart{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#2ecc71;
color:white;
font-size:16px;
display:none;
}

</style>
</head>

<body>

<div class="card" id="card">

<div class="character" id="character">🐼</div>

<h2>Multiplication Game</h2>

<div class="question">
<span id="n1">?</span> × <span id="n2">?</span>
</div>

<div class="timer" id="timer"></div>

<div class="choices">
<button class="choice" onclick="selectAnswer(this)" id="c1"></button>
<button class="choice" onclick="selectAnswer(this)" id="c2"></button>
<button class="choice" onclick="selectAnswer(this)" id="c3"></button>
<button class="choice" onclick="selectAnswer(this)" id="c4"></button>
</div>

<div class="result" id="result"></div>

<div class="score">
Question: <span id="qnum">0</span> / 20 |
Score: <span id="score">0</span>
</div>

<div class="medal" id="medal"></div>

<button class="restart" id="restartBtn" onclick="restartGame()">Restart</button>

<div class="footer">© Vimal</div>

</div>

<script>

let animals=["🐼","🐵","🐸","🐰","🐯","🦊","🐻"];

let n1,n2,answer;
let question=0;
let score=0;
let timer;
let timeLeft=5;
let answered=false;

function correctSound(){
let ctx=new (window.AudioContext||window.webkitAudioContext)();
let osc=ctx.createOscillator();
osc.type="triangle";
osc.frequency.value=700;
osc.connect(ctx.destination);
osc.start();
setTimeout(()=>osc.stop(),200);
}

function wrongSound(){
let ctx=new (window.AudioContext||window.webkitAudioContext)();
let osc=ctx.createOscillator();
osc.type="sawtooth";
osc.frequency.value=200;
osc.connect(ctx.destination);
osc.start();
setTimeout(()=>osc.stop(),300);
}

function shuffle(arr){
return arr.sort(()=>Math.random()-0.5);
}

function starAnimation(){
let card=document.getElementById("card");
for(let i=0;i<8;i++){
let star=document.createElement("div");
star.className="star";
star.innerHTML="⭐";
star.style.left=Math.random()*300+"px";
card.appendChild(star);
setTimeout(()=>star.remove(),1000);
}
}

function generateChoices(){
let choices=new Set();
choices.add(answer);

while(choices.size<4){
let wrong=answer + Math.floor(Math.random()*10)-5;
if(wrong>0 && wrong!=answer){
choices.add(wrong);
}
}

return shuffle(Array.from(choices));
}

function disableButtons(){
document.querySelectorAll(".choice").forEach(btn=>{
btn.disabled=true;
});
}

function enableButtons(){
document.querySelectorAll(".choice").forEach(btn=>{
btn.disabled=false;
btn.classList.remove("correct","wrong");
});
}

function nextQuestion(){

answered=false;
enableButtons();

document.getElementById("result").innerHTML="";
document.getElementById("medal").innerHTML="";
document.getElementById("character").innerHTML=
animals[Math.floor(Math.random()*animals.length)];

if(question>=20){

disableButtons();

let medal="";
if(score>=16){medal="🥇 Gold";}
else if(score>=10){medal="🥈 Silver";}
else{medal="🥉 Bronze";}

document.getElementById("result").innerHTML=
"🏆 Final Score: "+score+" / 20";

document.getElementById("medal").innerHTML=medal;
document.getElementById("timer").innerHTML="";
document.getElementById("restartBtn").style.display="inline-block";

return;
}

question++;
document.getElementById("qnum").innerHTML=question;

n1=Math.floor(Math.random()*9)+2;
n2=Math.floor(Math.random()*9)+2;
answer=n1*n2;

document.getElementById("n1").innerHTML=n1;
document.getElementById("n2").innerHTML=n2;

let choices=generateChoices();

document.getElementById("c1").innerHTML=choices[0];
document.getElementById("c2").innerHTML=choices[1];
document.getElementById("c3").innerHTML=choices[2];
document.getElementById("c4").innerHTML=choices[3];

startTimer();
}

function startTimer(){

clearInterval(timer);
timeLeft=5;

timer=setInterval(function(){

document.getElementById("timer").innerHTML=
"Time: "+timeLeft+" sec";

timeLeft--;

if(timeLeft<0){
clearInterval(timer);
showCorrect();
}

},1000);
}

function selectAnswer(btn){

if(answered) return;

answered=true;
clearInterval(timer);

let val=parseInt(btn.innerHTML);

document.querySelectorAll(".choice").forEach(b=>{
let bval=parseInt(b.innerHTML);
if(bval==answer){
b.classList.add("correct");
}
});

if(val==answer){

score++;
document.getElementById("score").innerHTML=score;
document.getElementById("result").innerHTML="✅ Correct!";
btn.classList.add("correct");

correctSound();
starAnimation();

}else{

btn.classList.add("wrong");

document.getElementById("result").innerHTML=
"❌ Wrong! Correct: "+answer;

wrongSound();
}

disableButtons();

setTimeout(nextQuestion,1200);
}

function showCorrect(){

if(answered) return;

answered=true;

document.querySelectorAll(".choice").forEach(b=>{
let bval=parseInt(b.innerHTML);
if(bval==answer){
b.classList.add("correct");
}
});

document.getElementById("result").innerHTML=
"⏰ Time up! Correct: "+answer;

wrongSound();

disableButtons();

setTimeout(nextQuestion,1200);
}

function restartGame(){

question=0;
score=0;

document.getElementById("score").innerHTML=0;
document.getElementById("qnum").innerHTML=0;
document.getElementById("medal").innerHTML="";
document.getElementById("restartBtn").style.display="none";

nextQuestion();
}

nextQuestion();

</script>

</body>
</html>
